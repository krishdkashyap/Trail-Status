<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trail — Trail Status</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="header-inner">
            <h1>Add Trail</h1>
            <p class="tagline">Add a new trail to the database</p>
        </div>
    </header>

    <main>
        <div class="admin-bar">
            <a href="{{ url_for('admin') }}" class="btn btn-secondary">← Back to Admin</a>
        </div>

        <form method="POST" class="trail-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="name">Trail Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Uwharrie National Forest">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" required placeholder="e.g. Troy, NC">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="difficulty">Difficulty</label>
                    <select id="difficulty" name="difficulty" required>
                        <option value="">Select...</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Intermediate / Advanced">Intermediate / Advanced</option>
                        <option value="Advanced">Advanced</option>
                        <option value="Advanced / Expert">Advanced / Expert</option>
                        <option value="Expert">Expert</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="length">Length</label>
                    <input type="text" id="length" name="length" required placeholder="e.g. 8.5 miles">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="drainage">Drainage</label>
                    <select id="drainage" name="drainage" required>
                        <option value="">Select...</option>
                        <option value="good">Good</option>
                        <option value="moderate">Moderate</option>
                        <option value="poor">Poor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="soil">Soil Type</label>
                    <input type="text" id="soil" name="soil" required placeholder="e.g. Loam, clay, rock">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="lat">Center Latitude</label>
                    <input type="number" id="lat" name="lat" required step="0.0001"
                           placeholder="e.g. 35.877">
                </div>

                <div class="form-group">
                    <label for="lon">Center Longitude</label>
                    <input type="number" id="lon" name="lon" required step="0.0001"
                           placeholder="e.g. -80.210">
                </div>
            </div>

            <p class="form-hint">
                💡 To get coordinates: right-click any point on Google Maps → "What's here?" → copy the lat/lon shown.
            </p>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" required rows="4"
                          placeholder="Describe the trail character, features, and any wet-weather notes..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Trail</button>

        </form>
    </main>

    <footer>
        <p>Trail Status Admin</p>
    </footer>

</body>
</html>
